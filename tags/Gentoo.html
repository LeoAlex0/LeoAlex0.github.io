      ;(function () {
        var storedTheme = null;

        try {
          storedTheme = window.localStorage.getItem("theme");
        } catch (error) {
          storedTheme = null;
        }

        if (storedTheme !== "dark" && storedTheme !== "light") {
          storedTheme = null;
        }

        var prefersDark = window.matchMedia &&
          window.matchMedia("(prefers-color-scheme: dark)").matches;
        var theme = storedTheme || (prefersDark ? "dark" : "light");

        var storedLanguage = null;

        try {
          storedLanguage = window.localStorage.getItem("language");
        } catch (error) {
          storedLanguage = null;
        }

        if (storedLanguage !== "zh-CN" && storedLanguage !== "en") {
          storedLanguage = document.documentElement.lang || "zh-CN";
        }

        document.documentElement.dataset.theme = theme;
        document.documentElement.dataset.language = storedLanguage;
        document.documentElement.lang = storedLanguage;
      })();
    </script>
